  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - "F:/docker_configs/qbittorrent/config:/config"
      - "M:/downloads:/downloads"
      - "M:/anime:/anime"
      - "M:/tv:/tv"
      - "M:/movies:/movies"
      - "M:/music:/music"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
    restart: unless-stopped

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - "F:/docker_configs/flaresolverr/config:/config"
    ports:
      - "8191:8191"
      - "8192:8192"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
    restart: unless-stopped


  seer:
    image: seerr/seerr:latest
    container_name: seer
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "5055:5055"
    volumes:
      - "F:/docker_configs/seer/config:/app/config"
      - "M:/downloads:/downloads"
      - "M:/anime:/anime"
      - "M:/tv:/tv"
      - "M:/movies:/movies"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
    restart: unless-stopped

  seedr:
    image: ghcr.io/rursache/seedr:latest
    container_name: seedr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "49152:49152"
      - "8084:8080"
    volumes:
       - "F:/docker_configs/seedr/config:/data"
       - "M:/downloads:/downloads"
       - "M:/anime:/anime"
       - "M:/tv:/tv"
       - "M:/movies:/movies"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
    restart: unless-stopped
  
    

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "4533:4533"
    volumes:
      - "F:/docker_configs/navidrome/config:/data"
      - "M:/music:/music"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
    restart: unless-stopped