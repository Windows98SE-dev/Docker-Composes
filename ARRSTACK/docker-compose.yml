services:
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "7878:7878"
    volumes:
      - "F:/docker_configs/radarr/config:/config"
      - "M:/downloads:/downloads"
      - "M:/movies:/movies"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
    restart: unless-stopped

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "9696:9696"
    volumes:
      - "F:/docker_configs/prowlarr/config:/config"
      - "M:/downloads:/downloads"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8989:8989"
    volumes:
      - "F:/docker_configs/sonarr/config:/config"
      - "M:/downloads:/downloads"
      - "M:/anime:/anime"
      - "M:/tv:/tv"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
    restart: unless-stopped

  lidarr:
    image: linuxserver/lidarr:latest
    container_name: lidarr
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8686:8686"
    volumes:
      - "F:/docker_configs/lidarr/config:/config"
      - "M:/downloads:/downloads"
      - "M:/music:/music"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
    restart: unless-stopped

  # sabnzbd:
  #   image: linuxserver/sabnzbd:latest
  #   container_name: sabnzbd
