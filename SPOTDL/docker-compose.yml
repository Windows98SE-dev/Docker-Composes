services:
  spotdl:
    # On remplace 'image' par 'build' pour compiler le Dockerfile local
    build:
      context: . # Pointe vers le dossier courant contenant le Dockerfile de la branche dev
      dockerfile: Dockerfile
      args:
        UID: 1000 # Gardé par défaut, bien que moins critique sur Windows avec Docker Desktop
        GID: 1000
    
    container_name: spotdl
    # L'image n'a pas de nom fixe car elle est construite localement
    
    command: web --host 0.0.0.0 --web-use-output-dir
    
    restart: unless-stopped
    
    ports:
      - "8800:8800"
    
    volumes:
      # Dossier de sortie pour la musique
      - M:/music:/music
      # Dossier de configuration (note: dans le Dockerfile, le user est 'spotdl', pas root)
      # Le Dockerfile crée le user 'spotdl', donc le home est /home/spotdl, pas /root
      # Il est préférable de mapper vers le home du user créé ou d'ignorer ce mount si la config est dans /app
      - F:/docker_config/spotdl:/home/spotdl/.spotdl
    
    environment:
      - TZ=Europe/Zurich
      # Optionnel : Si vous avez un Client ID Spotify, ajoutez-le ici pour éviter les blocages
      # - SPOTIPY_CLIENT_ID=votre_id
      # - SPOTIPY_CLIENT_SECRET=votre_secret

    working_dir: /music